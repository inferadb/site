title: InferaDB
description: "The Authorization Database. High-performance, fine-grained access control at scale."
url: "https://inferadb.com"
baseurl: ""
github_repo: "https://github.com/inferadb/site"

markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO defaults
twitter:
  card: summary_large_image
social:
  name: InferaDB
  links:
    - https://github.com/inferadb
    - https://discord.gg/inferadb
logo: /assets/images/og-logo.png

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - DISPATCH_TEASERS.md
  - .jekyll-cache
  - vendor
  - assets/images/og-source.svg
  - assets/images/linkedin-banner-source.svg
  - assets/images/linkedin-banner.png
  - docs/plans
