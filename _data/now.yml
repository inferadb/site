- title: "Raft Consensus for Authorization: Why Eventual Consistency Is Unacceptable"
  date: 2026-03-10
  category: practices
  slug: raft-consensus-authorization
  excerpt: "If Alice revokes Bob's access at 10:00:00 and Bob's request at 10:00:01 hits a stale replica, he retains access. This is the 'new enemy problem.' InferaDB uses Raft consensus with revision tokens to solve it."
  authors:
    - Evan Sims

