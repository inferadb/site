- title: "How AI Agents Are Breaking Traditional Authorization"
  date: 2026-03-14
  category: ai
  slug: ai-agents-breaking-authorization
  excerpt: "Traditional systems handle 1–2 permission checks per request. Agent workflows require dozens. At 5–50ms per check, that's seconds of latency. At 2.8µs, InferaDB makes agent-scale authorization tractable."
  authors:
    - Evan Sims

