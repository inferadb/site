  role: "Co-Founder & CTO"
  photo: /assets/images/evan-sims.jpeg
  bio: "20+ years in identity, security, and infrastructure engineering. Founding engineer on Auth0's fine-grained authorization team at Okta, where he helped build OpenFGA — now a CNCF incubating project used in production by Grafana Labs, Docker, and Canonical. Led Auth0's open-source SDK ecosystem serving millions of developers and helped lead FedRAMP certification. Brings deep expertise in distributed systems, storage engines, and the Rust ecosystem to InferaDB's architecture."
