- name: Jane Sims
  slug: jane-sims
  role: "Co-Founder & CEO"
  photo: /assets/images/jane-sims.jpeg
  bio: "Jane spent decades building and scaling a multimillion dollar construction company from the ground up — managing complex operations, regulated environments, enterprise procurement cycles, and the kind of compliance pressure that keeps executives awake at night. She knows what it costs when the wrong person accesses the wrong system, because she's lived on the other side of that risk. At InferaDB she owns go-to-market strategy, enterprise relationships, and the business development motion that converts developer adoption into enterprise contracts. She brings something rare to deep tech: the operator's instinct for what regulated businesses actually buy, and why."
