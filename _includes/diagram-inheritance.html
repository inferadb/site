<div class="auth-diagram" role="img" aria-label="Permission inheritance diagram showing a user inheriting document access through a folder's viewer relation using tuple-to-userset">
  <svg viewBox="0 0 620 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow-inh" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 3.5 L 0 7 z" class="arrow-active" />
      </marker>
      <marker id="arrow-dim" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 3.5 L 0 7 z" class="arrow" />
      </marker>
    </defs>

    <!-- user:dana -->
    <rect x="10" y="70" width="120" height="40" rx="3" class="entity-box-highlight" />
    <text x="70" y="95" text-anchor="middle" class="entity-label">user:dana</text>

    <!-- folder:engineering -->
    <rect x="230" y="70" width="160" height="40" rx="3" class="entity-box-highlight" />
    <text x="310" y="95" text-anchor="middle" class="entity-label">folder:engineering</text>

    <!-- document:roadmap -->
    <rect x="470" y="70" width="140" height="40" rx="3" class="entity-box-highlight" />
    <text x="540" y="95" text-anchor="middle" class="entity-label">document:roadmap</text>

    <!-- dana → viewer → folder -->
    <line x1="130" y1="90" x2="228" y2="90" class="relation-line-active" marker-end="url(#arrow-inh)" />
    <text x="179" y="82" text-anchor="middle" class="relation-label">viewer</text>

    <!-- document → folder → folder (parent relation) -->
    <line x1="468" y1="90" x2="392" y2="90" class="relation-line" marker-end="url(#arrow-dim)" />
    <text x="430" y="82" text-anchor="middle" class="relation-label">folder</text>

    <!-- Step labels -->
    <text x="179" y="140" text-anchor="middle" style="fill: var(--accent); font-family: var(--font-mono); font-size: 10px;">① stored tuple</text>
    <text x="430" y="140" text-anchor="middle" style="fill: var(--text-secondary); font-family: var(--font-mono); font-size: 10px;">② follow parent</text>

    <!-- Resolved result -->
    <text x="310" y="30" text-anchor="middle" style="fill: var(--accent); font-family: var(--font-mono); font-size: 11px;">viewer from folder → ✓ dana can view roadmap</text>
    <line x1="310" y1="35" x2="310" y2="68" class="relation-line-active" stroke-dasharray="4 3" />
  </svg>
  <div class="auth-diagram-caption">Tuple-to-Userset: viewer from folder resolves inherited access</div>
</div>
