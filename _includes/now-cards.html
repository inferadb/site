<div class="card-grid">
{% for entry in include.entries %}
<a href="/dispatch/{{ entry.slug }}" class="card">
  <div class="card-meta">
    <span class="card-label-accent">{{ entry.category }}</span>
    <time datetime="{{ entry.date }}">{{ entry.date | date: "%b %d, %Y" }}</time>
  </div>
  <h2 class="card-title">{{ entry.title }}</h2>
  <p class="card-excerpt">{{ entry.excerpt }}</p>
  {% if entry.authors %}
  <div class="card-authors">
    {% for author in entry.authors %}<span>{{ author }}</span>{% endfor %}
  </div>
  {% endif %}
</a>
{% endfor %}
</div>
