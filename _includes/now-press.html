<div class="card-grid">
{% for entry in include.entries %}
<a href="{{ entry.url }}" class="card"{% if entry.url contains "://" %} target="_blank" rel="noopener"{% endif %}>
  <div class="card-meta">
    <span class="card-label-accent">{{ entry.source }}</span>
    <time datetime="{{ entry.date }}">{{ entry.date | date: "%b %d, %Y" }}</time>
  </div>
  <h2 class="card-title">{{ entry.title }}</h2>
  <p class="card-excerpt">{{ entry.excerpt }}</p>
</a>
{% endfor %}
</div>
