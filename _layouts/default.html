<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% seo %}
    <link rel="preload" href="{{ '/assets/fonts/figtree.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="{{ '/assets/fonts/inter.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="{{ '/assets/fonts/jetbrains-mono.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face { font-family:'Figtree'; src:url('/assets/fonts/figtree.woff2') format('woff2'); font-weight:400 800; font-display:block; }
      @font-face { font-family:'Inter'; src:url('/assets/fonts/inter.woff2') format('woff2'); font-weight:400 600; font-display:block; }
      @font-face { font-family:'JetBrains Mono'; src:url('/assets/fonts/jetbrains-mono.woff2') format('woff2'); font-weight:400 500; font-display:block; }
    </style>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
    <link rel="alternate" type="application/atom+xml" title="InferaDB Dispatch" href="{{ '/dispatch/feed.xml' | relative_url }}" />
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}" />
    <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}" />
    <link rel="author" href="{{ '/humans.txt' | relative_url }}" />
    <link rel="help" href="{{ '/llms.txt' | relative_url }}" type="text/plain" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "InferaDB",
      "description": "{{ page.description | default: site.description | escape }}",
      "url": "{{ site.url }}",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Linux, macOS, Windows, Kubernetes",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Open source community edition"
      },
      "author": {
        "@type": "Organization",
        "name": "InferaDB",
        "url": "https://inferadb.com",
        "logo": "https://inferadb.com/assets/images/og-logo.png",
        "sameAs": [
          "https://github.com/inferadb",
          "https://discord.gg/inferadb"
        ]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "InferaDB",
      "url": "https://inferadb.com",
      "logo": "https://inferadb.com/assets/images/og-logo.png",
      "description": "Managed authorization infrastructure for modern software.",
      "foundingDate": "2025",
      "founders": [
        { "@type": "Person", "name": "Evan Sims", "jobTitle": "Co-Founder & CTO" },
        { "@type": "Person", "name": "Jane Sims", "jobTitle": "Co-Founder & CEO" }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@inferadb.com",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://github.com/inferadb",
        "https://linkedin.com/company/inferadb",
        "https://discord.gg/inferadb"
      ]
    }
    </script>
  </head>
  <body class="{{ page.body_class }}" data-layout="{{ page.layout }}">
    <a href="#main-content" class="skip-link">Skip to content</a>
    {% include nav.html %}
    <main id="main-content">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
