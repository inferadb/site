---
layout: default
body_class: page-dispatch
---
<section class="dispatch-section">
  <div class="container">
    <header class="dispatch-header">
      <h1>Dispatch</h1>
    </header>
    <nav class="dispatch-tabs" aria-label="Content categories">
      <a href="/dispatch/"{% if page.dispatch_category == nil %} class="active" aria-current="page"{% endif %}>All</a>
      <a href="/changelog/"{% if page.dispatch_category == "changelog" %} class="active" aria-current="page"{% endif %}>Changelog</a>
      <a href="/dispatch/news/"{% if page.dispatch_category == "company" %} class="active" aria-current="page"{% endif %}>Company</a>
      <a href="/dispatch/ai/"{% if page.dispatch_category == "ai" %} class="active" aria-current="page"{% endif %}>AI</a>
      <a href="/dispatch/engineering/"{% if page.dispatch_category == "engineering" %} class="active" aria-current="page"{% endif %}>Engineering</a>
      <a href="/dispatch/security/"{% if page.dispatch_category == "security" %} class="active" aria-current="page"{% endif %}>Security</a>
      <a href="/dispatch/press/"{% if page.dispatch_category == "press" %} class="active" aria-current="page"{% endif %}>Reading List</a>
    </nav>
    <div class="dispatch-entries">
      {{ content }}
    </div>
  </div>
</section>
