---
layout: default
body_class: page-now
---
<section class="now-section">
  <div class="container">
    <header class="now-header">
      <h1>Now</h1>
    </header>
    <nav class="now-tabs" aria-label="Content categories">
      <a href="/now/"{% if page.now_category == nil %} class="active"{% endif %}>All</a>
      <a href="/changelog/"{% if page.now_category == "changelog" %} class="active"{% endif %}>Changelog</a>
      <a href="/now/news/"{% if page.now_category == "news" %} class="active"{% endif %}>News</a>
      <a href="/now/ai/"{% if page.now_category == "ai" %} class="active"{% endif %}>AI</a>
      <a href="/now/practices/"{% if page.now_category == "practices" %} class="active"{% endif %}>Practices</a>
      <a href="/now/press/"{% if page.now_category == "press" %} class="active"{% endif %}>Press</a>
    </nav>
    <div class="now-entries">
      {{ content }}
    </div>
  </div>
</section>
