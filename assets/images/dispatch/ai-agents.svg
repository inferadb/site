<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <g transform="translate(480, 200)">
    <!-- Single origin point -->
    <circle cx="-140" cy="0" r="5" fill="#dce1e8"/>

    <!-- Fan of lines from origin -->
    <line x1="-135" y1="0" x2="120" y2="-90" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-135" y1="0" x2="130" y2="-60" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-135" y1="0" x2="135" y2="-30" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-135" y1="0" x2="140" y2="0" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-135" y1="0" x2="135" y2="30" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-135" y1="0" x2="130" y2="60" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-135" y1="0" x2="120" y2="90" stroke="#dce1e8" stroke-width="0.5"/>

    <!-- Terminal dots: many checks -->
    <circle cx="120" cy="-90" r="3" fill="#dce1e8"/>
    <circle cx="130" cy="-60" r="3" fill="#dce1e8"/>
    <circle cx="135" cy="-30" r="3" fill="#dce1e8"/>
    <circle cx="140" cy="0" r="3" fill="#dce1e8"/>
    <circle cx="135" cy="30" r="3" fill="#dce1e8"/>
    <circle cx="130" cy="60" r="3" fill="#dce1e8"/>
    <circle cx="120" cy="90" r="3" fill="#dce1e8"/>
  </g>
</svg>
