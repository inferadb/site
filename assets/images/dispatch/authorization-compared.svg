<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">
  <rect width="960" height="400" fill="#0b0d11"/>

  <!-- InferaDB: hexagon with three connected nodes -->
  <g transform="translate(280, 200)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <circle cx="0" cy="-10" r="3.5" stroke="#dce1e8" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="-10" r="1.5" fill="#dce1e8"/>
    <circle cx="-12" cy="10" r="3.5" stroke="#dce1e8" stroke-width="0.5" fill="none"/>
    <circle cx="-12" cy="10" r="1.5" fill="#dce1e8"/>
    <circle cx="12" cy="10" r="3.5" stroke="#dce1e8" stroke-width="0.5" fill="none"/>
    <circle cx="12" cy="10" r="1.5" fill="#dce1e8"/>
    <line x1="0" y1="-6" x2="-10" y2="7" stroke="#dce1e8" stroke-width="0.4"/>
    <line x1="0" y1="-6" x2="10" y2="7" stroke="#dce1e8" stroke-width="0.4"/>
    <line x1="-8" y1="10" x2="8" y2="10" stroke="#dce1e8" stroke-width="0.4"/>
  </g>

  <!-- OpenFGA: open square with inner lattice -->
  <g transform="translate(400, 200)">
    <rect x="-22" y="-22" width="44" height="44" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#dce1e8" stroke-width="0.3"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#dce1e8" stroke-width="0.3"/>
    <circle cx="-11" cy="-11" r="2" fill="#dce1e8"/>
    <circle cx="11" cy="-11" r="2" fill="#dce1e8"/>
    <circle cx="-11" cy="11" r="2" fill="#dce1e8"/>
    <circle cx="11" cy="11" r="2" fill="#dce1e8"/>
  </g>

  <!-- AuthZed: diamond with central point -->
  <g transform="translate(520, 200)">
    <polygon points="0,-28 28,0 0,28 -28,0" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <polygon points="0,-14 14,0 0,14 -14,0" stroke="#dce1e8" stroke-width="0.3" fill="none"/>
    <circle cx="0" cy="0" r="2" fill="#dce1e8"/>
  </g>

  <!-- Oso: circle with inner rings -->
  <g transform="translate(640, 200)">
    <circle r="24" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <circle r="14" stroke="#dce1e8" stroke-width="0.3" fill="none"/>
    <circle r="2" fill="#dce1e8"/>
  </g>
</svg>
