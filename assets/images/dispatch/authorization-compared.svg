<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <!-- InferaDB: bold hexagon, heavy inner nodes -->
  <g transform="translate(265, 200)">
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
    <circle cx="0" cy="-15" r="5" fill="#dce1e8"/>
    <circle cx="-14" cy="10" r="5" fill="#dce1e8"/>
    <circle cx="14" cy="10" r="5" fill="#dce1e8"/>
    <line x1="0" y1="-10" x2="-12" y2="6" stroke="#dce1e8" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="12" y2="6" stroke="#dce1e8" stroke-width="1.5"/>
    <line x1="-9" y1="10" x2="9" y2="10" stroke="#dce1e8" stroke-width="1.5"/>
  </g>

  <!-- OpenFGA: oversized square, thick grid, overshooting lines -->
  <g transform="translate(395, 200)">
    <rect x="-32" y="-32" width="64" height="64" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#dce1e8" stroke-width="1.25"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#dce1e8" stroke-width="1.25"/>
    <circle cx="-16" cy="-16" r="4" fill="#dce1e8"/>
    <circle cx="16" cy="-16" r="4" fill="#dce1e8"/>
    <circle cx="-16" cy="16" r="4" fill="#dce1e8"/>
    <circle cx="16" cy="16" r="4" fill="#dce1e8"/>
  </g>

  <!-- AuthZed: heavy diamond, inner diamond offset slightly -->
  <g transform="translate(530, 200)">
    <polygon points="0,-40 40,0 0,40 -40,0" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
    <polygon points="0,-18 18,0 0,18 -18,0" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <circle cx="0" cy="0" r="3.5" fill="#dce1e8"/>
  </g>

  <!-- Oso: bold circle, off-center inner ring -->
  <g transform="translate(665, 200)">
    <circle r="35" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
    <circle cx="0" cy="0" r="18" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="#dce1e8"/>
  </g>
</svg>
