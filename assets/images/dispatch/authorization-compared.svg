<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <!-- Hexagon -->
  <g transform="translate(300, 200)">
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Square -->
  <g transform="translate(420, 200)">
    <rect x="-32" y="-32" width="64" height="64" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Diamond -->
  <g transform="translate(540, 200)">
    <polygon points="0,-36 36,0 0,36 -36,0" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Circle -->
  <g transform="translate(660, 200)">
    <circle r="34" stroke="#dce1e8" stroke-width="2.5" fill="none"/>
  </g>
</svg>
