<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <!-- InferaDB: hexagon with three connected nodes -->
  <g transform="translate(280, 200)">
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <circle cx="0" cy="-16" r="4.5" stroke="#dce1e8" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="-16" r="2" fill="#dce1e8"/>
    <circle cx="-15" cy="9" r="4.5" stroke="#dce1e8" stroke-width="0.5" fill="none"/>
    <circle cx="-15" cy="9" r="2" fill="#dce1e8"/>
    <circle cx="15" cy="9" r="4.5" stroke="#dce1e8" stroke-width="0.5" fill="none"/>
    <circle cx="15" cy="9" r="2" fill="#dce1e8"/>
    <line x1="0" y1="-11" x2="-13" y2="5" stroke="#dce1e8" stroke-width="0.4"/>
    <line x1="0" y1="-11" x2="13" y2="5" stroke="#dce1e8" stroke-width="0.4"/>
    <line x1="-10" y1="9" x2="10" y2="9" stroke="#dce1e8" stroke-width="0.4"/>
  </g>

  <!-- OpenFGA: open square with inner lattice -->
  <g transform="translate(400, 200)">
    <rect x="-28" y="-28" width="56" height="56" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#dce1e8" stroke-width="0.3"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#dce1e8" stroke-width="0.3"/>
    <circle cx="-14" cy="-14" r="2.5" fill="#dce1e8"/>
    <circle cx="14" cy="-14" r="2.5" fill="#dce1e8"/>
    <circle cx="-14" cy="14" r="2.5" fill="#dce1e8"/>
    <circle cx="14" cy="14" r="2.5" fill="#dce1e8"/>
  </g>

  <!-- AuthZed: diamond with central point -->
  <g transform="translate(520, 200)">
    <polygon points="0,-36 36,0 0,36 -36,0" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <polygon points="0,-18 18,0 0,18 -18,0" stroke="#dce1e8" stroke-width="0.3" fill="none"/>
    <circle cx="0" cy="0" r="2.5" fill="#dce1e8"/>
  </g>

  <!-- Oso: circle with inner rings -->
  <g transform="translate(640, 200)">
    <circle r="30" stroke="#dce1e8" stroke-width="0.75" fill="none"/>
    <circle r="18" stroke="#dce1e8" stroke-width="0.3" fill="none"/>
    <circle r="2.5" fill="#dce1e8"/>
  </g>
</svg>
