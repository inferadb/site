<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <g transform="translate(350, 200)">
    <!-- Trunk -->
    <line x1="0" y1="0" x2="100" y2="0" stroke="#dce1e8" stroke-width="3" stroke-linecap="round"/>

    <!-- First fork -->
    <line x1="100" y1="0" x2="160" y2="-50" stroke="#dce1e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="0" x2="160" y2="50" stroke="#dce1e8" stroke-width="2" stroke-linecap="round"/>

    <!-- Second fork: top -->
    <line x1="160" y1="-50" x2="210" y2="-85" stroke="#dce1e8" stroke-width="1.25" stroke-linecap="round"/>
    <line x1="160" y1="-50" x2="215" y2="-25" stroke="#dce1e8" stroke-width="1.25" stroke-linecap="round"/>

    <!-- Second fork: bottom -->
    <line x1="160" y1="50" x2="215" y2="25" stroke="#dce1e8" stroke-width="1.25" stroke-linecap="round"/>
    <line x1="160" y1="50" x2="210" y2="85" stroke="#dce1e8" stroke-width="1.25" stroke-linecap="round"/>

    <!-- Third fork: tips -->
    <line x1="210" y1="-85" x2="250" y2="-105" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="210" y1="-85" x2="255" y2="-70" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="215" y1="-25" x2="255" y2="-40" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="215" y1="-25" x2="250" y2="-10" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="215" y1="25" x2="250" y2="10" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="215" y1="25" x2="255" y2="40" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="210" y1="85" x2="255" y2="70" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="210" y1="85" x2="250" y2="105" stroke="#dce1e8" stroke-width="0.5" stroke-linecap="round"/>
  </g>
</svg>
