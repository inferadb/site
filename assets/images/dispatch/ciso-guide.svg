    <circle cx="56" cy="42" r="2.5" fill="#dce1e8"/>
    <circle cx="38" cy="58" r="1.5" fill="#dce1e8"/>
    <circle cx="18" cy="68" r="2" fill="#dce1e8"/>
    <circle cx="-4" cy="72" r="1.5" fill="#dce1e8"/>
    <circle cx="-26" cy="65" r="2" fill="#dce1e8"/>
    <circle cx="-44" cy="53" r="2.5" fill="#dce1e8"/>
    <circle cx="-58" cy="37" r="1.5" fill="#dce1e8"/>
    <circle cx="-67" cy="16" r="2" fill="#dce1e8"/>
    <circle cx="-71" cy="-6" r="1.5" fill="#dce1e8"/>
    <circle cx="-64" cy="-28" r="2" fill="#dce1e8"/>
    <circle cx="-52" cy="-46" r="2.5" fill="#dce1e8"/>
    <circle cx="-34" cy="-60" r="1.5" fill="#dce1e8"/>
    <circle cx="-12" cy="-69" r="2" fill="#dce1e8"/>
