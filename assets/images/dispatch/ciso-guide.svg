    <circle cx="-14" cy="6" r="2" fill="#dce1e8"/>
    <circle cx="5" cy="16" r="2.5" fill="#dce1e8"/>
    <circle cx="-6" cy="-4" r="1.5" fill="#dce1e8"/>
