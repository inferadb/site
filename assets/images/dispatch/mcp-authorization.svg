<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <g transform="translate(480, 200)">
    <!-- Agent node (left) -->
    <circle cx="-120" cy="0" r="5" fill="#dce1e8"/>

    <!-- Tool server boundary (right) — open border, no gate -->
    <rect x="40" y="-70" width="120" height="140" rx="2" stroke="#dce1e8" stroke-width="1" stroke-dasharray="4 3" fill="none"/>

    <!-- Tools inside the boundary -->
    <circle cx="70" cy="-40" r="3" fill="#dce1e8"/>
    <circle cx="110" cy="-40" r="3" fill="#dce1e8"/>
    <circle cx="70" cy="0" r="3" fill="#dce1e8"/>
    <circle cx="110" cy="0" r="3" fill="#dce1e8"/>
    <circle cx="70" cy="40" r="3" fill="#dce1e8"/>
    <circle cx="110" cy="40" r="3" fill="#dce1e8"/>

    <!-- Lines from agent to ALL tools — no gate, unrestricted access -->
    <line x1="-115" y1="0" x2="67" y2="-40" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-115" y1="0" x2="107" y2="-40" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-115" y1="0" x2="67" y2="0" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-115" y1="0" x2="107" y2="0" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-115" y1="0" x2="67" y2="40" stroke="#dce1e8" stroke-width="0.5"/>
    <line x1="-115" y1="0" x2="107" y2="40" stroke="#dce1e8" stroke-width="0.5"/>

    <!-- Gap in the boundary where the lines pass through — the missing gate -->
    <line x1="40" y1="-20" x2="40" y2="20" stroke="#0b0d11" stroke-width="2"/>
  </g>
</svg>
