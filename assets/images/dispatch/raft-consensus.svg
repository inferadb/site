    <line x1="0" y1="-60" x2="0" y2="60" stroke="#dce1e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="-60" x2="35" y2="60" stroke="#dce1e8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
