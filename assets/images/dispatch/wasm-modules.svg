<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">

  <g transform="translate(480, 200)">
    <!-- 3x3 grid: 8 hollow, 1 filled -->

    <!-- Row 1 -->
    <rect x="-52" y="-52" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
    <rect x="-11" y="-52" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
    <rect x="30" y="-52" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>

    <!-- Row 2 -->
    <rect x="-52" y="-11" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
    <rect x="-11" y="-11" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
    <rect x="30" y="-11" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="#dce1e8"/>

    <!-- Row 3 -->
    <rect x="-52" y="30" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
    <rect x="-11" y="30" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
    <rect x="30" y="30" width="30" height="30" stroke="#dce1e8" stroke-width="2" fill="none"/>
  </g>
</svg>
