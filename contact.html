---
title: Contact
layout: default
body_class: page-contact
---

<section class="page-content">
    <div class="container">
        <header class="page-header">
            <h1>Get in Touch</h1>
            <p class="subtitle">
                Have questions about InferaDB? We'd love to hear from you.
            </p>
        </header>
        <article>
            <form
                class="contact-form"
                action="https://formspree.io/f/xzdjnjza"
                method="POST"
            >
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="first-name"
                            >First Name</label
                        >
                        <input
                            class="form-input"
                            type="text"
                            id="first-name"
                            name="first-name"
                            placeholder="Jane"
                            required
                            autocomplete="given-name"
                        />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="last-name"
                            >Last Name</label
                        >
                        <input
                            class="form-input"
                            type="text"
                            id="last-name"
                            name="last-name"
                            placeholder="Doe"
                            required
                            autocomplete="family-name"
                        />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        class="form-input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="jane@example.com"
                        required
                        autocomplete="email"
                    />
                </div>
                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea
                        class="form-textarea"
                        id="message"
                        name="message"
                        placeholder="Tell us what you're working on..."
                        required
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    Send Message
                </button>
            </form>
            <div style="margin-top: 3rem">
                <p>You can also reach us at:</p>
                <ul>
                    <li>
                        <a href="mailto:open@inferadb.com">open@inferadb.com</a>
                        — General inquiries
                    </li>
                    <li>
                        <a href="mailto:security@inferadb.com"
                            >security@inferadb.com</a
                        >
                        — Security disclosures
                    </li>
                    <li>
                        <a
                            href="https://discord.gg/inferadb"
                            target="_blank"
                            rel="noopener"
                            >Discord</a
                        >
                        — Community chat
                    </li>
                </ul>
            </div>
        </article>
    </div>
</section>
